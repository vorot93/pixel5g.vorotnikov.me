name: Deploy to GitHub Pages
on:
  push: { branches: [main, master] }
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: false }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        run: rustup toolchain install stable --profile minimal && rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0
      - name: Build wasm
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: bash scripts/build-wasm.sh
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build static site
        run: pnpm exec qwik build   # build.wasm already ran above; pnpm exec resolves node_modules/.bin in CI
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deploy.outputs.page_url }}" }
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
